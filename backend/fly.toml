# fly.toml
app = 'backend-winter-grass-6714'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "1234"
  NODE_ENV = "production"

[http_service]
  internal_port = 1234
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024